<div class="container-custom" [class.is-mobile-custom]="mobileQuery.matches">
  <mat-toolbar style="height: 50px; background-color: #919191a3;" class="toolbar-custom">
    <button mat-mini-fab
        color="default"
        aria-label="Menu"
        (click)="snavClick(snav)">
      <mat-icon>{{ menuIcon }}</mat-icon>
    </button>
    <!--
    <h1 class="example-app-name"></h1>
    <span class="spacer"></span>
    <button mat-mini-fab
        matTooltip="vicente.pspenha@gmail.com"
        aria-label="Contate-me">
      <mat-icon>contact_mail</mat-icon>
    </button>
    -->
  </mat-toolbar>

  <mat-sidenav-container class="sidenav-container-custom" style="background-color: transparent;"
                         [style.marginTop.px]="mobileQuery.matches ? 56 : 0">
    <mat-sidenav #snav [mode]="mobileQuery.matches ? 'over' : 'side'"
                 [fixedInViewport]="mobileQuery.matches" fixedTopGap="56">
      <mat-nav-list>
        <a mat-list-item routerLink="." *ngFor="let nav of fillerNav">{{nav}}</a>
      </mat-nav-list>
    </mat-sidenav>

    <mat-sidenav-content>
      <!-- <p *ngFor="let content of fillerContent">{{content}}</p> -->
    </mat-sidenav-content>
  </mat-sidenav-container>
</div>
